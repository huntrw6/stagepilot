name: Release Windows

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag that receives the Windows installer
        required: true
        default: v1.0.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.12"
          working-directory: backend

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install frontend and desktop dependencies
        run: |
          npm ci --prefix frontend
          npm ci --prefix desktop

      - name: Select stable Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Build Windows application and installer
        run: npm --prefix desktop run build

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: stagepilot-windows-installer
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Attach installer to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: |
          $installer = Get-ChildItem desktop/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          if (-not $installer) { throw "Windows installer was not found." }
          gh release upload "$env:RELEASE_TAG" "$($installer.FullName)" --clobber
