name: Release macOS

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: GitHub release tag that receives the disk images
        required: true
        default: v1.1.0
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: macOS — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Apple Silicon
            runner: macos-15
            artifact: stagepilot-macos-apple-silicon
          - name: Intel
            runner: macos-15-intel
            artifact: stagepilot-macos-intel
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.12"
          working-directory: backend

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install frontend and desktop dependencies
        run: |
          npm ci --prefix frontend
          npm ci --prefix desktop

      - name: Select stable Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Build macOS application and disk image
        run: npm --prefix desktop run build:mac

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Attach disk image to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: gh release upload "$RELEASE_TAG" desktop/src-tauri/target/release/bundle/dmg/*.dmg --clobber
