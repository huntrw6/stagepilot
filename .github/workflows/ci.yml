name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend — Python 3.12
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.12"
          working-directory: backend

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run --frozen pytest

      - name: Run lint
        run: uv run --frozen ruff check .

      - name: Check formatting
        run: uv run --frozen ruff format --check .

      - name: Run type checking
        run: uv run --frozen mypy

  frontend:
    name: Frontend — Node 22
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run lint
        run: npm --prefix frontend run lint

      - name: Run type checking
        run: npm --prefix frontend run typecheck

      - name: Build frontend
        run: npm --prefix frontend run build

  desktop:
    name: Desktop — Rust on Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select stable Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Check Rust formatting
        run: cargo fmt --manifest-path desktop/src-tauri/Cargo.toml --check

      - name: Compile-check desktop shell
        run: cargo check --manifest-path desktop/src-tauri/Cargo.toml