name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend — Python 3.12
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.12"
          working-directory: backend

      - name: Install locked dependencies
        run: uv sync --locked --extra dev

      - name: Run tests
        run: uv run --frozen pytest

      - name: Run lint
        run: uv run --frozen ruff check .

      - name: Check formatting
        run: uv run --frozen ruff format --check .

      - name: Run type checking
        run: uv run --frozen mypy

  frontend:
    name: Frontend — Node 22
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Run lint
        run: npm --prefix frontend run lint

      - name: Run tests
        run: npm --prefix frontend test

      - name: Run type checking
        run: npm --prefix frontend run typecheck

      - name: Build frontend
        run: npm --prefix frontend run build

  multitracks-cues:
    name: MultiTracks cues — Node 22
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: tools/multitracks-cues/package-lock.json

      - name: Install locked dependencies
        run: npm ci --prefix tools/multitracks-cues

      - name: Run tests
        run: npm --prefix tools/multitracks-cues test -- --run

      - name: Run lint
        run: npm --prefix tools/multitracks-cues run lint

      - name: Run type checking
        run: npm --prefix tools/multitracks-cues run typecheck

      - name: Build CLI package
        run: npm --prefix tools/multitracks-cues run build

  desktop:
    name: Desktop installer — Windows
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          python-version: "3.12"
          working-directory: backend

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Install frontend and desktop dependencies
        run: |
          npm ci --prefix frontend
          npm ci --prefix desktop

      - name: Select stable Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Check Rust formatting
        run: cargo fmt --manifest-path desktop/src-tauri/Cargo.toml --check

      - name: Compile-check desktop shell
        run: cargo check --manifest-path desktop/src-tauri/Cargo.toml

      - name: Run desktop lifecycle tests
        run: cargo test --manifest-path desktop/src-tauri/Cargo.toml

      - name: Build packaged application and installer
        run: npm --prefix desktop run build

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: stagepilot-windows-installer
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  desktop-macos-lifecycle:
    name: Desktop lifecycle — macOS
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend assets
        run: |
          npm ci --prefix frontend
          npm --prefix frontend run build

      - name: Select stable Rust
        run: |
          rustup update stable
          rustup default stable

      - name: Check Rust formatting
        run: cargo fmt --manifest-path desktop/src-tauri/Cargo.toml --check

      - name: Compile-check macOS desktop shell
        run: cargo check --manifest-path desktop/src-tauri/Cargo.toml

      - name: Run macOS desktop lifecycle tests
        run: cargo test --manifest-path desktop/src-tauri/Cargo.toml
